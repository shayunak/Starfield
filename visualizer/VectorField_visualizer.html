<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Cesium Satellite Position Visualization (Time Range)</title>
  
  <!-- CesiumJS -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  
  <!-- PapaParse: CSV Parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <style>
    html, body, #cesiumContainer { 
      width: 100%; 
      height: 100%; 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
    }
    .ui {
      position: absolute; 
      top: 12px; 
      left: 12px; 
      z-index: 10;
      background: rgba(30,30,30,0.85); 
      color: #fff; 
      padding: 12px 16px; 
      border-radius: 8px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-width: 360px;
    }
    .ui input[type="file"] {
      padding: 6px 8px; 
      border-radius: 6px; 
      border: 1px solid rgba(255,255,255,0.3); 
      background: #222; 
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .ui input[type="number"] {
      width: 120px;
      padding: 6px 8px; 
      border-radius: 6px; 
      border: 1px solid rgba(255,255,255,0.3); 
      background: #222; 
      color: #fff;
      font-size: 13px;
    }
    .ui button {
      padding: 8px 14px; 
      border-radius: 6px; 
      border: 0; 
      background: #47a3ff; 
      color: #001b33; 
      font-weight: 600; 
      cursor: pointer;
      font-size: 13px;
    }
    .ui button:disabled {
      background: #666; 
      color: #999; 
      cursor: not-allowed;
    }
    .ui button:hover:not(:disabled) {
      background: #5bb3ff;
    }
    .ui small { 
      opacity: 0.8; 
      font-size: 12px;
    }
    .ui label { 
      font-size: 13px; 
      font-weight: 500;
    }
    .ui .info {
      background: rgba(71, 163, 255, 0.15);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- UI: Select position file and time range -->
  <div class="ui">
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <div style="display: flex; gap: 10px; align-items: center;">
        <label for="positionFile">Position File:</label>
        <input id="positionFile" type="file" accept=".csv" />
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <label for="fieldFile">Vector Field File:</label>
        <input id="fieldFile" type="file" accept=".csv" />
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <label for="timeStart">Start Time (ms):</label>
        <input id="timeStart" type="number" placeholder="e.g. 2000" />
      </div>
      <div style="display: none; gap: 10px; align-items: center;">
        <label for="timeRange">Time Range (ms):</label>
        <input id="timeRange" type="number" value="999" />
      </div>
      <div class="info">
        💡 Default range is 999ms, e.g., entering 2000ms will display satellites from 2000~2999ms
      </div>
      <div style="display: flex; gap: 10px;">
        <button id="loadBtn" disabled>Display Satellites & Vector Fields</button>
      </div>
      <small id="statusMsg">Please select position.csv and field.csv files and enter start time</small>
    </div>
  </div>

  <script type="module">
    // 1) Set Cesium Ion Token
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlMTliMWEyOC0yMzYyLTQzYmEtODBkMS1mODA1YjZjNDk5NDciLCJpZCI6MzA2ODU2LCJpYXQiOjE3NDgzNzc4ODd9.Y5dofUrWFXLroBTqI9JHdAuh4Jc2ACZpuY586gEWWVo';

    // 2) Initialize Viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      timeline: false, 
      animation: false, 
      geocoder: false, 
      baseLayerPicker: true,
      sceneModePicker: true, 
      navigationHelpButton: false, 
      selectionIndicator: true
    });


    // 3) Load CSV from file
    function loadCsvFromFile(file) {
      return new Promise((resolve, reject) => {
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: results => {
            if (results.errors && results.errors.length > 0) {
              console.warn('CSV parsing warnings:', results.errors);
            }
            resolve(results.data);
          },
          error: err => reject(err)
        });
      });
    }

    // 4) Create arrow function
    function createArrowFromTo(basePosition, direction, scale = 100000) {
      const scaledDirection = Cesium.Cartesian3.multiplyByScalar(
        direction,
        scale,
        new Cesium.Cartesian3()
      );
      const targetPosition = Cesium.Cartesian3.add(
        basePosition,
        scaledDirection,
        new Cesium.Cartesian3()
      );

      // Create arrow entity (from basePosition to targetPosition)
      return viewer.entities.add({
        polyline: {
          positions: [basePosition, targetPosition],
          width: 4,
          material: new Cesium.PolylineArrowMaterialProperty(Cesium.Color.YELLOW),
          clampToGround: false
        },
        name: 'vector_arrow',
        description: 'Vector field arrow'
      });
    }

    // 5) Display satellite positions in specified time range
    async function displaySatellitesInTimeRange() {
      const status = document.getElementById('statusMsg');
      const positionFileInput = document.getElementById('positionFile');
      const fieldFileInput = document.getElementById('fieldFile');
      const timeStartInput = document.getElementById('timeStart');
      const timeRangeInput = document.getElementById('timeRange');

      if (!positionFileInput.files[0]) {
        status.textContent = 'Please select position file';
        return;
      }

      if (!fieldFileInput.files[0]) {
        status.textContent = 'Please select vector field file';
        return;
      }

      if (timeStartInput.value === '') {
        status.textContent = 'Please enter start time';
        return;
      }

      const timeStart = Number(timeStartInput.value);
      const timeRange = Number(timeRangeInput.value);
      
      if (!Number.isFinite(timeStart) || !Number.isFinite(timeRange)) {
        status.textContent = 'Time must be a number';
        return;
      }

      const timeEnd = timeStart + timeRange;

      status.textContent = 'Loading CSV files...';
      viewer.entities.removeAll();

      try {
        // Load CSV files
        const [positionRows, fieldRows] = await Promise.all([
          loadCsvFromFile(positionFileInput.files[0]),
          loadCsvFromFile(fieldFileInput.files[0])
        ]);
        
        if (positionRows.length === 0) {
          status.textContent = 'No data in position file';
          return;
        }

        if (fieldRows.length === 0) {
          status.textContent = 'No data in vector field file';
          return;
        }

        // Build satellite ID to vector field mapping
        const fieldMap = new Map();
        for (const field of fieldRows) {
          const satelliteId = String(field.Satellite || '').trim();
          if (satelliteId) {
            const fieldX = Number(field.Field_X);
            const fieldY = Number(field.Field_Y);
            const fieldZ = Number(field.Field_Z);
            
            if (Number.isFinite(fieldX) && Number.isFinite(fieldY) && Number.isFinite(fieldZ)) {
              fieldMap.set(satelliteId, { x: fieldX, y: fieldY, z: fieldZ });
            }
          }
        }

        // Filter satellites in specified time range
        const satelliteMap = new Map();
        
        for (const row of positionRows) {
          const timestamp = Number(row['TimeStamp(ms)']);
          
          // Check if within time range
          if (!Number.isFinite(timestamp) || timestamp < timeStart || timestamp > timeEnd) {
            continue;
          }

          const id = String(row.Id || row.ID || '').trim();
          
          // Only process satellites with vector field data
          if (!fieldMap.has(id)) {
            continue;
          }

          const x = Number(row['X(m)'] || row.X || row.x);
          const y = Number(row['Y(m)'] || row.Y || row.y);
          const z = Number(row['Z(m)'] || row.Z || row.z);

          // Skip invalid data
          if (!id || !Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) {
            continue;
          }

          // Keep latest data for each satellite in the time range
          const existing = satelliteMap.get(id);
          if (!existing || timestamp > existing.timestamp) {
            satelliteMap.set(id, {
              id,
              x,
              y,
              z,
              timestamp
            });
          }
        }

        if (satelliteMap.size === 0) {
          status.textContent = `No satellites found with vector field data in time range ${timeStart}~${timeEnd}ms`;
          return;
        }

        // Draw all satellites and arrows for this time range
        const created = [];
        for (const [id, satellite] of satelliteMap) {
          const { x, y, z, timestamp } = satellite;

          // Use Cartesian3 coordinates
          const basePosition = new Cesium.Cartesian3(x, y, z);

          // Get vector field data for this satellite from the map
          const fieldData = fieldMap.get(id);
          if (!fieldData) continue;

          // Vector field direction
          const direction = new Cesium.Cartesian3(fieldData.x, fieldData.y, fieldData.z);

          // Add green satellite point
          const entity = viewer.entities.add({
            position: basePosition,
            point: {
              pixelSize: 10,
              color: Cesium.Color.LIME,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 2,
              heightReference: Cesium.HeightReference.NONE
            },
            label: {
              text: id,
              font: '8px sans-serif',
              pixelOffset: new Cesium.Cartesian2(0, -12),
              fillColor: Cesium.Color.WHITE,
              showBackground: true,
              backgroundColor: Cesium.Color.fromAlpha(Cesium.Color.LIME, 0.6),
              heightReference: Cesium.HeightReference.NONE,
              scale: 0.8
            },
            description: `
              <table style="font-family: sans-serif; font-size: 12px;">
                <tr><td><b>Satellite ID</b></td><td>${id}</td></tr>
                <tr><td><b>Timestamp (ms)</b></td><td>${timestamp}</td></tr>
                <tr><td><b>Position X (m)</b></td><td>${x.toFixed(2)}</td></tr>
                <tr><td><b>Position Y (m)</b></td><td>${y.toFixed(2)}</td></tr>
                <tr><td><b>Position Z (m)</b></td><td>${z.toFixed(2)}</td></tr>
                <tr><td><b>Vector X</b></td><td>${fieldData.x.toFixed(6)}</td></tr>
                <tr><td><b>Vector Y</b></td><td>${fieldData.y.toFixed(6)}</td></tr>
                <tr><td><b>Vector Z</b></td><td>${fieldData.z.toFixed(6)}</td></tr>
              </table>
            `
          });
          created.push(entity);

          // Create arrow
          //can change the scale value
          const arrowEntity = createArrowFromTo(basePosition, direction, 500000);
          created.push(arrowEntity);
        }
        if (created.length > 0) {
          await viewer.zoomTo(viewer.entities);
          const satelliteCount = satelliteMap.size;
          status.textContent = `Successfully displayed ${satelliteCount} satellites and vector arrows in time range ${timeStart}~${timeEnd}ms`;
        }

      } catch (error) {
        status.textContent = 'Failed to load files: ' + error.message;
        console.error('File loading error:', error);
      }
    }

    // 6) Bind UI events
    const positionFileInput = document.getElementById('positionFile');
    const fieldFileInput = document.getElementById('fieldFile');
    const timeStartInput = document.getElementById('timeStart');
    const timeRangeInput = document.getElementById('timeRange');
    const loadBtn = document.getElementById('loadBtn');

    // Check input status and update button
    function updateButtonState() {
      const hasPositionFile = positionFileInput.files.length > 0;
      const hasFieldFile = fieldFileInput.files.length > 0;
      const hasTimeStart = timeStartInput.value !== '';
      const hasTimeRange = timeRangeInput.value !== '';
      loadBtn.disabled = !(hasPositionFile && hasFieldFile && hasTimeStart && hasTimeRange);
      
      if (!hasPositionFile || !hasFieldFile) {
        document.getElementById('statusMsg').textContent = 'Please select position.csv and field.csv files and enter start time';
      } else if (!hasTimeStart) {
        document.getElementById('statusMsg').textContent = 'Please enter start time';
      } else if (!hasTimeRange) {
        document.getElementById('statusMsg').textContent = 'Please enter time range';
      } else {
        const start = Number(timeStartInput.value);
        const range = Number(timeRangeInput.value);
        if (Number.isFinite(start) && Number.isFinite(range)) {
          document.getElementById('statusMsg').textContent = `Ready, will display satellites from ${start}~${start + range}ms`;
        } else {
          document.getElementById('statusMsg').textContent = 'Ready, click button to display satellites';
        }
      }
    }

    // Listen to input changes
    positionFileInput.addEventListener('change', updateButtonState);
    fieldFileInput.addEventListener('change', updateButtonState);
    timeStartInput.addEventListener('input', updateButtonState);
    timeRangeInput.addEventListener('input', updateButtonState);

    // Enter key quick execution
    timeStartInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !loadBtn.disabled) {
        displaySatellitesInTimeRange();
      }
    });

    // Load button click event
    loadBtn.addEventListener('click', displaySatellitesInTimeRange);
  </script>
</body>
</html>
